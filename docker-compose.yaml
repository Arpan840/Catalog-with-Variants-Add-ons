version: "3.8"
name: catalog-service

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Test@123
      POSTGRES_DB: Catlog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: arpan840/catalog-service-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      DBHOSTNAME: db
      DBPORT: 5432
      USER_NAME: postgres
      DBPASSWORD: Test@123
      DBNAME: Catlog
      BASEURL: https://images.unsplash.com
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: arpan840/catalog-service-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  pgadmin:
     image: dpage/pgadmin4
     restart: unless-stopped
     environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
     ports: 
      - "5050:80"
     depends_on: 
      - db

volumes:
  pgdata: