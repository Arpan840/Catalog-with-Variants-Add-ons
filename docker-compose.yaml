version: "3.8"
name: catalog-service

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-catalog_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-catalog_pass}
      POSTGRES_DB: ${POSTGRES_DB:-catalog_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-catalog_user}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DBHOSTNAME: db
      DBPORT: 5432
      USER_NAME: ${POSTGRES_USER:-catalog_user}
      DBPASSWORD: ${POSTGRES_PASSWORD:-catalog_pass}
      DBNAME: ${POSTGRES_DB:-catalog_db}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./catalog-frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata: